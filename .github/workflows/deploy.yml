name: Deploy to GitHub Pages

on:
  # Trigger the workflow on push to main branch
  push:
    branches: [ main ]
  
  # Allow manual trigger from Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build public artifact
        run: |
          set -euo pipefail
          mkdir -p _site/assets _site/images
          cp *.html CNAME .nojekyll _site/
          cp -R css js _site/
          cp assets/cv-gideon-chiusole.pdf _site/assets/
          cp -R assets/citations assets/publications assets/seminars _site/assets/
          find images -maxdepth 1 -type f \( \
            -name '*.jpg' -o \
            -name '*.jpeg' -o \
            -name '*.png' -o \
            -name '*.gif' -o \
            -name '*.webp' -o \
            -name '*.mp4' \
          \) -exec cp {} _site/images/ \;

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
